<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قصص الأنبياء | El Huda</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.prophets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;padding:0 0 60px;}
.prophet-card{
  background:linear-gradient(145deg,rgba(212,175,106,.07),rgba(255,255,255,.02));
  border:1px solid var(--line);border-radius:16px;padding:26px 22px;
  text-decoration:none;display:block;color:inherit;
  opacity:0;transform:translateY(24px) scale(.96);
  transition:opacity .45s ease,transform .45s cubic-bezier(.34,1.56,.64,1),border-color .3s,box-shadow .3s;
  position:relative;overflow:hidden;
}
.prophet-card.vis{opacity:1;transform:translateY(0) scale(1);}
.prophet-card:hover{transform:translateY(-8px) scale(1.02)!important;border-color:var(--gold);box-shadow:0 20px 44px -16px rgba(212,175,106,.4);}
.prophet-card:active{transform:scale(.96)!important;transition-duration:.1s!important;}
.prophet-card::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(110deg,transparent 30%,rgba(212,175,106,.1) 50%,transparent 70%);background-size:200%;opacity:0;transition:opacity .3s;}
.prophet-card:hover::after{opacity:1;animation:shimmer .8s linear;}
.prop-num{position:absolute;top:14px;right:14px;color:var(--gold);font-size:.72em;letter-spacing:1px;font-family:"Poppins",sans-serif;}
[dir="ltr"] .prop-num{right:auto;left:14px;}
.prop-icon{font-size:2em;margin-bottom:12px;}
.prop-name{font-size:1.2em;font-weight:800;color:var(--gold-soft);margin-bottom:10px;}
.prop-preview{color:var(--text-dim);font-size:.9em;line-height:1.7;}
.prop-link{display:inline-block;margin-top:12px;color:var(--gold);font-size:.85em;font-weight:700;}
</style>
</head>
<body data-lang="ar">
<canvas id="bg3d"></canvas>
<div class="pattern"></div>
<header class="topbar">
  <a class="brand" href="index.html">
    <img class="logo-img" src="assets/logo.png" alt="Al-Huda">
    <div><h1 data-i18n="brand">الهُدى</h1><small data-i18n="brand_sub">EL HUDA</small></div>
  </a>
  <nav class="links" id="navLinks">
    <a href="index.html" data-i18n="nav_home">الرئيسية</a>
    <a href="quran.html" data-i18n="nav_quran">القرآن</a>
    <a href="articles.html" data-i18n="nav_articles" class="current">مقالات</a>
    <a href="tools.html" data-i18n="nav_tools">أدوات</a>
    <a href="about.html" data-i18n="nav_about">من نحن</a>
  </nav>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="lang-switch"><select id="langSelect"><option value="ar">AR</option><option value="fr">FR</option><option value="en">EN</option></select></div>
    <div class="theme-wrap">
      <button class="theme-toggle" id="themeToggle">🎨</button>
      <div class="theme-panel" id="themePanel">
        <button class="theme-option active" data-theme="dark"><span class="theme-swatch swatch-dark"></span>Dark</button>
        <button class="theme-option" data-theme="dark-warm"><span class="theme-swatch swatch-dark-warm"></span>Warm</button>
        <button class="theme-option" data-theme="black"><span class="theme-swatch swatch-black"></span>Black</button>
        <button class="theme-option" data-theme="light"><span class="theme-swatch swatch-light"></span>Light</button>
      </div>
    </div>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </div>
</header>
<section class="page-hero" style="min-height:28vh;">
  <img class="page-illustration" src="assets/geometric.svg" alt="" aria-hidden="true">
  <h2 id="storiesTitle">قصص الأنبياء</h2>
  <p class="lead" id="storiesSub">عبر ودروس من قصص الأنبياء عليهم السلام</p>
</section>
<section style="position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 4vw;">
  <div class="prophets-grid" id="prophetsGrid"></div>
</section>
<footer>
  <div class="social-bar">
    <a class="social-btn discord" href="https://discord.com" target="_blank" rel="noopener">💬 Discord</a>
    <a class="social-btn instagram" href="https://instagram.com" target="_blank" rel="noopener">📸 Instagram</a>
    <a class="social-btn tiktok" href="https://tiktok.com" target="_blank" rel="noopener">🎵 TikTok</a>
  </div>
  <div class="brand-line">الهُدى · El Huda</div>
  <p>© 2026 El Huda.</p>
</footer>
<script src="lang.js"></script>
<script src="content.js"></script>
<script>
(function(){
var SLUGS=["adam","idris","nuh","hud","salih","ibrahim","lut","ismail","ishaq","yaqub","yusuf","ayyub","shuayb","musa","harun","dawud","sulayman","ilyas","alyasa","yunus","dhulkifl","zakariya","yahya","isa","muhammad"];
var ICONS=["🌱","📜","🚢","🏞️","🐪","🔥","🏙️","🐑","🌅","🕯️","👑","🤲","⚖️","🌊","🎙️","🛡️","🦅","🔥","📿","🐋","🤝","👶","🌿","✨","🕊️"];
var READ={ar:"اقرأ القصة كاملة ←",en:"Read full story →",fr:"Lire l\'histoire →"};
var PL={ar:{title:"قصص الأنبياء",sub:"عبر ودروس من قصص الأنبياء عليهم السلام"},en:{title:"Stories of the Prophets",sub:"Lessons from the stories of the Prophets, peace be upon them"},fr:{title:"Histoires des Prophètes",sub:"Leçons des histoires des Prophètes, paix sur eux"}};

function getLang(){return document.body.getAttribute("data-lang")||"ar";}

function build(){
  var lang=getLang(),grid=document.getElementById("prophetsGrid");
  if(!grid)return;
  if(typeof storiesList==="undefined"||!storiesList){setTimeout(build,120);return;}
  var list=storiesList[lang]||storiesList.ar;
  var read=READ[lang]||READ.ar;
  grid.innerHTML=list.map(function(item,i){
    var preview=item.s.length>130?item.s.substring(0,130)+"...":item.s;
    return "<a class=\"prophet-card\" href=\"story-"+SLUGS[i]+".html\"><span class=\"prop-num\">"+(i+1)+"</span><div class=\"prop-icon\">"+(ICONS[i]||"🕊️")+"</div><div class=\"prop-name\">"+item.p+"</div><div class=\"prop-preview\">"+preview+"</div><span class=\"prop-link\">"+read+"</span></a>";
  }).join("");
  var cards=grid.querySelectorAll(".prophet-card");
  if("IntersectionObserver" in window){
    var obs=new IntersectionObserver(function(entries){entries.forEach(function(e,idx){if(e.isIntersecting){(function(el,d){setTimeout(function(){el.classList.add("vis");},d);})(e.target,idx*25);obs.unobserve(e.target);}});},{threshold:0.05,rootMargin:"0px 0px -10px 0px"});
    cards.forEach(function(c){obs.observe(c);});
  }else{cards.forEach(function(c){c.classList.add("vis");});}
  // mobile touch
  cards.forEach(function(c){
    c.addEventListener("touchstart",function(){c.style.transform="scale(.96)";},{passive:true});
    c.addEventListener("touchend",function(){setTimeout(function(){c.style.transform="";},200);});
  });
  var L=PL[lang]||PL.ar;
  var t=document.getElementById("storiesTitle"),s=document.getElementById("storiesSub");
  if(t)t.textContent=L.title;if(s)s.textContent=L.sub;
}

document.addEventListener("DOMContentLoaded",build);
document.addEventListener("langchange",build);
})();
</script>
<script src="effects.js" defer></script>
</body>
</html>
