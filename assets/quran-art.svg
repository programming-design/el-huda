<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <radialGradient id="qg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="150" cy="150" r="140" fill="url(#qg)" stroke="#d4af6a" stroke-width="0.8" opacity="0.6"/>
  <!-- 8-pointed star -->
  <g transform="translate(150,150)">
    <polygon points="0,-80 18,-30 70,-25 28,10 42,62 0,38 -42,62 -28,10 -70,-25 -18,-30" stroke="#d4af6a" stroke-width="1.2" fill="none" opacity="0.8"/>
    <polygon points="0,-55 12,-20 48,-17 19,7 29,43 0,26 -29,43 -19,7 -48,-17 -12,-20" stroke="#d4af6a" stroke-width="0.8" fill="none" opacity="0.5"/>
    <circle r="20" stroke="#d4af6a" stroke-width="1" fill="none"/>
    <!-- Open book -->
    <rect x="-35" y="-8" width="30" height="40" rx="2" stroke="#d4af6a" stroke-width="1.5" fill="none"/>
    <rect x="5" y="-8" width="30" height="40" rx="2" stroke="#d4af6a" stroke-width="1.5" fill="none"/>
    <line x1="0" y1="-8" x2="0" y2="32" stroke="#d4af6a" stroke-width="1.5"/>
    <line x1="-28" y1="2" x2="-10" y2="2" stroke="#d4af6a" stroke-width="0.8" opacity="0.6"/>
    <line x1="-28" y1="8" x2="-10" y2="8" stroke="#d4af6a" stroke-width="0.8" opacity="0.6"/>
    <line x1="-28" y1="14" x2="-10" y2="14" stroke="#d4af6a" stroke-width="0.8" opacity="0.6"/>
    <line x1="10" y1="2" x2="28" y2="2" stroke="#d4af6a" stroke-width="0.8" opacity="0.6"/>
    <line x1="10" y1="8" x2="28" y2="8" stroke="#d4af6a" stroke-width="0.8" opacity="0.6"/>
    <line x1="10" y1="14" x2="28" y2="14" stroke="#d4af6a" stroke-width="0.8" opacity="0.6"/>
  </g>
  <!-- Outer geometric ring -->
  <g stroke="#d4af6a" stroke-width="0.6" opacity="0.35">
    <circle cx="150" cy="150" r="125"/>
    <circle cx="150" cy="150" r="115"/>
  </g>
</svg>
