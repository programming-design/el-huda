<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#d4af6a" stop-opacity=".1"/>
    </radialGradient>
  </defs>
  <!-- Stars geometric pattern -->
  <g stroke="#d4af6a" stroke-width="0.6" opacity="0.7">
    <polygon points="200,10 207,30 228,30 212,42 218,63 200,51 182,63 188,42 172,30 193,30" fill="none"/>
    <polygon points="50,60 55,75 70,75 59,83 63,98 50,90 37,98 41,83 30,75 45,75" fill="none"/>
    <polygon points="350,60 355,75 370,75 359,83 363,98 350,90 337,98 341,83 330,75 345,75" fill="none"/>
  </g>
  <!-- Main dome -->
  <ellipse cx="200" cy="120" rx="70" ry="55" stroke="#d4af6a" stroke-width="1.5" fill="url(#g1)" fill-opacity="0.15"/>
  <!-- Dome top crescent -->
  <line x1="200" y1="65" x2="200" y2="40" stroke="#d4af6a" stroke-width="1.5"/>
  <path d="M193,40 Q200,30 207,40 Q200,36 193,40Z" fill="#d4af6a" opacity=".8"/>
  <!-- Main building -->
  <rect x="100" y="170" width="200" height="100" rx="4" stroke="#d4af6a" stroke-width="1.2" fill="none"/>
  <!-- Side minarets -->
  <rect x="85" y="120" width="22" height="150" rx="3" stroke="#d4af6a" stroke-width="1" fill="none"/>
  <ellipse cx="96" cy="120" rx="11" ry="18" stroke="#d4af6a" stroke-width="1" fill="none"/>
  <rect x="293" y="120" width="22" height="150" rx="3" stroke="#d4af6a" stroke-width="1" fill="none"/>
  <ellipse cx="304" cy="120" rx="11" ry="18" stroke="#d4af6a" stroke-width="1" fill="none"/>
  <!-- Windows -->
  <path d="M175,200 Q175,185 185,185 Q195,185 195,200 L195,230 L175,230Z" stroke="#d4af6a" stroke-width="1" fill="none"/>
  <path d="M205,200 Q205,185 215,185 Q225,185 225,200 L225,230 L205,230Z" stroke="#d4af6a" stroke-width="1" fill="none"/>
  <!-- Arch windows -->
  <path d="M130,200 Q130,188 140,188 Q150,188 150,200 L150,215 L130,215Z" stroke="#d4af6a" stroke-width="1" fill="none"/>
  <path d="M250,200 Q250,188 260,188 Q270,188 270,200 L270,215 L250,215Z" stroke="#d4af6a" stroke-width="1" fill="none"/>
  <!-- Ground line -->
  <line x1="20" y1="270" x2="380" y2="270" stroke="#d4af6a" stroke-width="0.8" opacity="0.5"/>
  <!-- Geometric border pattern -->
  <rect x="5" y="5" width="390" height="290" rx="8" stroke="#d4af6a" stroke-width="0.5" stroke-dasharray="4,4" fill="none" opacity="0.4"/>
</svg>
